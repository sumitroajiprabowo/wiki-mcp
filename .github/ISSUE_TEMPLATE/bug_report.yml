name: Bug Report
description: Report a bug in llm-wiki-mcp
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure vault at ...
        2. Call tool `wiki_search` with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node -v`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP client
      options:
        - Claude Code (CLI)
        - Claude Desktop
        - Cursor
        - Other
    validations:
      required: true

  - type: textarea
    id: vault-config
    attributes:
      label: Vault configuration
      description: If relevant, share your vault path structure or MCP config (redact sensitive paths).
      render: json
    validations:
      required: false
